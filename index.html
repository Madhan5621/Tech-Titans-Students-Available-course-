<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnSphere — Login</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <!-- Animated background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-container">
    <div class="login-left">
      <div class="brand">
        <div class="brand-icon">⬡</div>
        <span class="brand-name">LearnSphere</span>
      </div>
      <div class="login-headline">
        <h1>Your learning<br><em>universe</em> awaits.</h1>
        <p>AI-powered courses, smart scheduling, and personalized paths built for the future.</p>
      </div>
      <div class="login-stats">
        <div class="stat"><span>2.4k+</span><label>Courses</label></div>
        <div class="stat"><span>98%</span><label>Job Rate</label></div>
        <div class="stat"><span>150+</span><label>Careers</label></div>
      </div>
    </div>

    <div class="login-right">
      <div class="login-card">
        <h2>Welcome back</h2>
        <p class="login-sub">Sign in to your dashboard</p>

        <div id="loginError" class="alert alert-error" style="display:none"></div>

        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <span class="input-icon">✉</span>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            <button class="toggle-pw" onclick="togglePassword()" type="button">👁</button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember"> Remember me
          </label>
          <a href="#" class="link-subtle">Forgot password?</a>
        </div>

        <button class="btn-primary btn-full" onclick="handleLogin()">
          <span>Sign In</span>
          <span class="btn-arrow">→</span>
        </button>

        <div class="divider"><span>or continue with</span></div>

        <div class="social-buttons">
          <button class="btn-social" onclick="demoLogin()">🚀 Demo Login</button>
          <button class="btn-social" onclick="demoLogin()">🎓 Student Access</button>
        </div>

        <p class="signup-prompt">New to LearnSphere? <a href="#" onclick="demoLogin()">Create free account →</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      document.getElementById('emailError').textContent = '';
      document.getElementById('passwordError').textContent = '';
      document.getElementById('loginError').style.display = 'none';

      if (!email) {
        document.getElementById('emailError').textContent = 'Email is required';
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailError').textContent = 'Enter a valid email address';
        valid = false;
      }

      if (!password) {
        document.getElementById('passwordError').textContent = 'Password is required';
        valid = false;
      } else if (password.length < 6) {
        document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
        valid = false;
      }

      if (!valid) return;

      // Save user session
      const user = {
        email: email,
        name: email.split('@')[0].charAt(0).toUpperCase() + email.split('@')[0].slice(1),
        avatar: email.charAt(0).toUpperCase(),
        loginTime: new Date().toISOString()
      };
      localStorage.setItem('ls_user', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    }

    function demoLogin() {
      const user = {
        email: 'alex.student@learnsphere.io',
        name: 'Alex Johnson',
        avatar: 'A',
        loginTime: new Date().toISOString()
      };
      localStorage.setItem('ls_user', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    }

    function togglePassword() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
